<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>첼라 개인정보처리방침 빌더</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-layout">
      <!-- ══════════════ SIDEBAR ══════════════ -->
      <div class="sidebar">
        <div class="sidebar-header">
          <div style="font-size: 12px; font-weight: 700; color: var(--text)">
            설정 패널
            <span style="font-size: 10px; color: var(--text3); font-weight: 400"
              >— 입력 즉시 미리보기 반영</span
            >
          </div>
          <div class="progress-bar">
            <div
              class="progress-fill"
              id="progressFill"
              style="width: 8%"
            ></div>
          </div>
          <div class="progress-text" id="progressText">STEP 1/13</div>
        </div>

        <div class="steps-nav" id="stepsNav">
          <div class="step-chip active" data-step="1" onclick="goStep(1)">
            1.기본정보
          </div>
          <div class="step-chip" data-step="2" onclick="goStep(2)">
            2.수집항목
          </div>
          <div class="step-chip" data-step="3" onclick="goStep(3)">3.아동</div>
          <div class="step-chip" data-step="4" onclick="goStep(4)">4.파기</div>
          <div class="step-chip" data-step="5" onclick="goStep(5)">
            5.제3자제공
          </div>
          <div class="step-chip" data-step="6" onclick="goStep(6)">6.위탁</div>
          <div class="step-chip" data-step="7" onclick="goStep(7)">
            7.국외이전
          </div>
          <div class="step-chip" data-step="8" onclick="goStep(8)">
            8.안전조치
          </div>
          <div class="step-chip" data-step="9" onclick="goStep(9)">
            9.자동수집장치
          </div>
          <div class="step-chip" data-step="10" onclick="goStep(10)">
            10.권리행사
          </div>
          <div class="step-chip" data-step="11" onclick="goStep(11)">
            11.책임자
          </div>
          <div class="step-chip" data-step="12" onclick="goStep(12)">
            12.추가이용
          </div>
          <div class="step-chip" data-step="13" onclick="goStep(13)">
            13.민감정보
          </div>
          <div class="step-chip" data-step="14" onclick="goStep(14)">
            14.가명정보
          </div>
          <div class="step-chip" data-step="15" onclick="goStep(15)">
            15.자동화결정
          </div>
          <div class="step-chip" data-step="16" onclick="goStep(16)">
            16.국내대리인
          </div>
          <div class="step-chip" data-step="17" onclick="goStep(17)">
            17.영상정보처리기기
          </div>
          <div class="step-chip" data-step="18" onclick="goStep(18)">
            18.자율보호활동
          </div>
        </div>

        <!-- step panels injected here by renderSteps() in js/engine/steps.js -->
        <div id="stepsContent"></div>

        <div style="flex: 1"></div>
        <div class="sidebar-footer">
          <button
            class="btn btn-ghost"
            id="prevBtn"
            onclick="prevStep()"
            style="display: none"
          >
            ← 이전
          </button>
          <button
            class="btn"
            id="nextBtn"
            onclick="nextStep()"
            style="
              background: var(--accent);
              color: #fff;
              flex: 1;
              justify-content: center;
            "
          >
            다음 →
          </button>
        </div>
      </div>

      <!-- ══════════════ RESIZE HANDLE ══════════════ -->
      <div class="resize-handle" id="resizeHandle"></div>

      <!-- ══════════════ PREVIEW ══════════════ -->
      <div class="preview-panel" id="previewPanel">
        <div class="preview-toolbar">
          <div class="preview-title">
            <div class="live-dot"></div>
            실시간 미리보기
          </div>
          <span
            class="loaded-file-chip"
            id="loadedFileChip"
            style="display: none"
          >
            <span class="loaded-file-icon">📂</span>
            <span class="loaded-file-name" id="loadedFileName"></span>
            <button
              type="button"
              class="loaded-file-close"
              onclick="clearLoadedFileChip()"
              title="파일명 표시 닫기"
              aria-label="파일명 표시 닫기"
            >
              ×
            </button>
          </span>
          <div style="flex: 1"></div>
          <div id="formatPicker" class="fmt-picker" style="display: none">
            <span class="fmt-label">서식</span>
            <div class="fmt-seg">
              <button
                class="fmt-btn active"
                id="fmtBoldBtn"
                onclick="setEditFormat('bold')"
                title="굵게 (Ctrl+B)"
              >
                <b>B</b> 볼드
              </button>
              <button
                class="fmt-btn"
                id="fmtHlBtn"
                onclick="setEditFormat('highlight')"
                title="노란 배경색 (Ctrl+B)"
              >
                🖍 배경
              </button>
            </div>
          </div>
          <button
            class="btn btn-ghost"
            id="revertEditBtn"
            style="font-size: 10px; padding: 5px 10px; display: none"
            onclick="revertEdits()"
          >
            ↺ 원본으로
          </button>
          <button
            class="btn btn-ghost"
            id="editModeBtn"
            style="font-size: 10px; padding: 5px 10px"
            onclick="toggleEditMode()"
          >
            ✏️ 편집
          </button>
          <span class="toolbar-divider"></span>
          <button
            class="btn btn-ghost"
            style="font-size: 10px; padding: 5px 10px"
            onclick="document.getElementById('projectFileInput').click()"
            title="저장한 .json 또는 상태가 내장된 HTML 파일을 불러옵니다"
          >
            📂 불러오기
          </button>
          <button
            class="btn btn-ghost"
            style="font-size: 10px; padding: 5px 10px"
            onclick="saveProjectFile()"
            title="현재 작업을 .json 프로젝트 파일로 저장합니다"
          >
            💾 저장
          </button>
          <input
            type="file"
            id="projectFileInput"
            accept=".json,.html,.htm"
            style="display: none"
            onchange="loadProjectFromFile(this)"
          />
          <span class="toolbar-divider"></span>
          <button
            class="btn btn-ghost"
            style="font-size: 10px; padding: 5px 10px"
            onclick="downloadWord()"
          >
            📄 Word
          </button>
          <button
            class="btn btn-ghost"
            style="font-size: 10px; padding: 5px 10px"
            onclick="downloadHTML()"
          >
            ⬇️ HTML
          </button>
        </div>
        <div class="restore-banner" id="restoreBanner" style="display: none">
          <span id="restoreBannerText">이전에 작업하던 내용이 있습니다.</span>
          <span style="flex: 1"></span>
          <button class="btn btn-ghost" onclick="restorePending()">
            이어서 작업
          </button>
          <button
            class="btn btn-ghost"
            onclick="dismissRestore()"
            title="이 기록을 지우고 새 문서로 시작합니다"
          >
            새로 시작 ✕
          </button>
        </div>
        <div class="edit-banner" id="editBanner" style="display: none"></div>
        <div class="preview-frame">
          <div class="preview-doc">
            <div id="previewContent" class="pp"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- /app-layout -->

    <div class="toast" id="toast"></div>

    <!-- modules (load order matters — js/ 폴더: core / sections / engine) -->
    <!-- core: 앱 골격 (state 가장 먼저) -->
    <script src="js/core/state.js"></script>
    <script src="js/core/navigation.js"></script>
    <script src="js/core/helpers.js"></script>
    <script src="js/core/sortable.js"></script>
    <!-- sections: 스텝별 기능 모듈 -->
    <script src="js/sections/collect.js"></script>
    <script src="js/sections/children.js"></script>
    <script src="js/sections/retention.js"></script>
    <script src="js/sections/thirdparty.js"></script>
    <script src="js/sections/delegation.js"></script>
    <script src="js/sections/overseas.js"></script>
    <script src="js/sections/security.js"></script>
    <script src="js/sections/behavioral.js"></script>
    <script src="js/sections/addusage.js"></script>
    <script src="js/sections/sensitive.js"></script>
    <script src="js/sections/pseudonym.js"></script>
    <script src="js/sections/autodecision.js"></script>
    <script src="js/sections/departments.js"></script>
    <script src="js/sections/cctv.js"></script>
    <!-- engine: 렌더·출력 -->
    <script src="js/engine/steps.js"></script>
    <script src="js/engine/preview.js"></script>
    <script src="js/engine/export.js"></script>
    <script src="js/engine/editmode.js"></script>
    <!-- core: 저장/불러오기/폼 복원 (preview·export 이후) -->
    <script src="js/core/persistence.js"></script>
    <!-- core: 설정 패널 줄바꿈(autoline) — preview 이후 로드 -->
    <script src="js/core/autoline.js"></script>
    <!-- core: 초기화 (가장 마지막) -->
    <script src="js/core/init.js"></script>
  </body>
</html>
