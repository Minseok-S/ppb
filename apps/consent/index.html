<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>동의서 빌더 — CELA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@600;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="editor.css" />
  </head>
  <body>
    <div class="app">
      <!-- ─── 상단바 ─── -->
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">同</span>
          <h1><span>동의서 빌더</span></h1>
        </div>

        <nav class="mode-switch" aria-label="출력 형태 선택">
          <button class="on" data-act="mode" data-mode="online">
            🌐 온라인 동의 화면
          </button>
          <button data-act="mode" data-mode="offline">
            🖨 오프라인 서식
          </button>
        </nav>

        <div class="actions" id="csb-actions"></div>
      </header>

      <!-- ─── 모바일 탭 ─── -->
      <nav class="mobile-tabs" aria-label="화면 전환">
        <button class="on" data-act="tab" data-tab="build">① 작성</button>
        <button data-act="tab" data-tab="preview">② 미리보기</button>
      </nav>

      <!-- ─── 레이아웃: 좌측 빌더 / 우측 미리보기 ─── -->
      <div class="layout">
        <aside class="builder active" id="csb-builder"></aside>
        <main class="stage" id="csb-stage"></main>
      </div>
    </div>

    <script src="editor.js"></script>
  </body>
</html>
