<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>문서 뷰어</title>
<!-- 오프라인 동작: 마크다운은 자체 파서, Word·한글은 로컬 lib/ 에서 로드 (인터넷 불필요) -->
<script src="lib/mammoth.browser.min.js"></script>
<script src="lib/fflate.min.js"></script>
<!-- PDF 렌더링: 기존 앱들과 동일한 pdf.js CDN (오프라인 시 PDF만 미동작) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
:root{
  --accent:#3d5af1; --accent2:#6c47e8; --accent3:#00b896;
  --bg:#f4f6fb; --surface:#ffffff; --surface2:#f1f3f8;
  --border:#e0e4ef; --text:#1a1d2e; --text2:#4a5068; --text3:#9298b0;
  --sans:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans); background:var(--bg); color:var(--text);
  display:flex; height:100dvh; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ─── SIDEBAR ─── */
.mdv-side{
  width:280px; flex-shrink:0; background:var(--surface);
  border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.mdv-side-head{
  padding:18px 18px 12px; border-bottom:1px solid var(--border);
}
.mdv-side-title{ font-size:13px; font-weight:800; letter-spacing:-.3px; }
.mdv-side-sub{ font-size:10px; color:var(--text3); font-family:var(--mono); margin-top:3px; }

.mdv-open{
  margin:12px 18px 4px; display:flex; gap:8px;
}
.mdv-btn{
  flex:1; display:flex; align-items:center; justify-content:center; gap:6px;
  padding:9px 12px; border:1px solid var(--border); border-radius:9px;
  background:var(--surface2); color:var(--text2); cursor:pointer;
  font-family:var(--sans); font-size:12px; font-weight:600;
  transition:background .15s,color .15s,border-color .15s;
}
.mdv-btn:hover{ background:#fff; color:var(--accent); border-color:var(--accent); }

.mdv-list-label{
  font-size:9.5px; font-weight:700; color:var(--text3);
  letter-spacing:.6px; text-transform:uppercase;
  padding:16px 18px 6px; font-family:var(--mono);
}
.mdv-list{ flex:1; overflow-y:auto; padding:0 10px 16px; }
.mdv-item{
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:8px; cursor:pointer;
  font-size:12.5px; color:var(--text2); font-weight:500;
  transition:background .12s,color .12s;
}
.mdv-item:hover{ background:var(--surface2); color:var(--text); }
.mdv-item.active{ background:var(--accent); color:#fff; }
.mdv-item .ico{ font-size:14px; opacity:.85; flex-shrink:0; }
.mdv-item .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.mdv-item .pth{ font-size:9px; color:var(--text3); font-family:var(--mono); margin-left:auto; flex-shrink:0; }
.mdv-item.active .pth{ color:rgba(255,255,255,.7); }
.mdv-item .tag{
  margin-left:auto; flex-shrink:0; font-family:var(--mono); font-size:8px; font-weight:700;
  color:var(--text3); background:var(--surface2); border-radius:4px; padding:2px 5px;
}
.mdv-item.active .tag{ background:rgba(255,255,255,.22); color:#fff; }
.mdv-recent{ padding:0 10px 4px; max-height:36vh; overflow-y:auto; }

/* ─── MAIN ─── */
.mdv-main{ flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
.mdv-topbar{
  height:46px; flex-shrink:0; border-bottom:1px solid var(--border);
  background:var(--surface); display:flex; align-items:center;
  padding:0 20px; gap:12px;
}
.mdv-cur{ font-size:12.5px; font-weight:700; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* 줌 컨트롤 */
.mdv-zoom{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
.zbtn{
  width:26px; height:26px; border:1px solid var(--border); background:var(--surface2);
  border-radius:7px; cursor:pointer; color:var(--text2); font-size:15px; font-weight:600;
  display:flex; align-items:center; justify-content:center; line-height:1;
  transition:background .12s,color .12s,border-color .12s;
}
.zbtn:hover{ background:#fff; color:var(--accent); border-color:var(--accent); }
.zbtn.zreset{ font-size:13px; margin-left:2px; }
.zlabel{
  min-width:44px; text-align:center; font-family:var(--mono); font-size:11px;
  font-weight:600; color:var(--text2); user-select:none;
}

/* 편집 · 다운로드 도구 */
.mdv-tools{ display:flex; align-items:center; gap:6px; flex-shrink:0; margin-right:8px; }
.tbtn{
  height:26px; padding:0 10px; border:1px solid var(--border); background:var(--surface2);
  border-radius:7px; cursor:pointer; color:var(--text2); font-family:var(--sans);
  font-size:11px; font-weight:600; display:flex; align-items:center; gap:4px;
  transition:background .12s,color .12s,border-color .12s;
}
.tbtn:hover:not(:disabled){ background:#fff; color:var(--accent); border-color:var(--accent); }
.tbtn:disabled{ opacity:.35; cursor:default; }
.tbtn.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
.mdv-doc.editing{ outline:1.5px dashed var(--accent); outline-offset:10px; border-radius:4px; caret-color:var(--accent); }

/* 토스트 */
.mdv-toast{
  position:fixed; bottom:26px; left:50%; transform:translate(-50%,8px);
  background:#1a1d2e; color:#fff; padding:10px 18px; border-radius:10px;
  font-size:12.5px; opacity:0; pointer-events:none; max-width:80vw;
  transition:opacity .25s,transform .25s; z-index:99;
}
.mdv-toast.show{ opacity:1; transform:translate(-50%,0); }
.mdv-cur .badge{
  display:inline-block; font-family:var(--mono); font-size:9px; font-weight:700;
  color:var(--accent); background:rgba(61,90,241,.1); border-radius:5px;
  padding:2px 6px; margin-right:8px; vertical-align:middle;
}
.mdv-scroll{ flex:1; overflow-y:auto; }
.mdv-doc{
  max-width:860px; margin:0 auto; padding:44px 56px 96px;
  font-size:15px; line-height:1.75; color:var(--text);
}

/* empty / drop state */
.mdv-empty{
  position:absolute; inset:46px 0 0 0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px; color:var(--text3);
  pointer-events:none; text-align:center; padding:0 30px;
}
.mdv-empty .big{ font-size:52px; }
.mdv-empty .t1{ font-size:16px; font-weight:700; color:var(--text2); }
.mdv-empty .t2{ font-size:12.5px; }
.mdv-main.drag::after{
  content:''; position:absolute; inset:10px; border:2.5px dashed var(--accent);
  border-radius:16px; background:rgba(61,90,241,.05); pointer-events:none; z-index:5;
}

/* ─── MARKDOWN TYPOGRAPHY ─── */
.mdv-doc h1,.mdv-doc h2,.mdv-doc h3,.mdv-doc h4,.mdv-doc h5,.mdv-doc h6{
  font-weight:800; line-height:1.3; letter-spacing:-.4px; color:var(--text);
  margin:1.8em 0 .7em;
}
.mdv-doc h1{ font-size:1.9em; margin-top:0; padding-bottom:.35em; border-bottom:1px solid var(--border); }
.mdv-doc h2{ font-size:1.5em; padding-bottom:.3em; border-bottom:1px solid var(--border); }
.mdv-doc h3{ font-size:1.25em; }
.mdv-doc h4{ font-size:1.08em; }
.mdv-doc h5,.mdv-doc h6{ font-size:1em; color:var(--text2); }
.mdv-doc p{ margin:.85em 0; }
.mdv-doc a{ color:var(--accent); text-decoration:none; border-bottom:1px solid rgba(61,90,241,.3); }
.mdv-doc a:hover{ border-bottom-color:var(--accent); }
.mdv-doc strong{ font-weight:700; }
.mdv-doc ul,.mdv-doc ol{ margin:.7em 0; padding-left:1.6em; }
.mdv-doc li{ margin:.3em 0; }
.mdv-doc li>ul,.mdv-doc li>ol{ margin:.3em 0; }
.mdv-doc code{
  font-family:var(--mono); font-size:.86em; background:var(--surface2);
  border:1px solid var(--border); border-radius:5px; padding:.12em .4em;
}
.mdv-doc pre{
  background:#1c1f2e; border-radius:10px; padding:16px 18px; overflow-x:auto;
  margin:1.1em 0; line-height:1.6;
}
.mdv-doc pre code{
  font-family:var(--mono); font-size:12.5px; color:#e4e7f4;
  background:none; border:none; padding:0;
}
.mdv-doc blockquote{
  margin:1.1em 0; padding:.6em 1.1em; border-left:4px solid var(--accent);
  background:var(--surface2); border-radius:0 8px 8px 0; color:var(--text2);
}
.mdv-doc blockquote p{ margin:.4em 0; }
.mdv-doc hr{ border:none; border-top:1px solid var(--border); margin:2em 0; }
.mdv-doc table{
  border-collapse:collapse; width:100%; margin:1.2em 0; font-size:.92em;
  display:block; overflow-x:auto;
}
.mdv-doc th,.mdv-doc td{ border:1px solid var(--border); padding:9px 13px; text-align:left; }
.mdv-doc th{ background:var(--surface2); font-weight:700; }
.mdv-doc tr:nth-child(even) td{ background:rgba(241,243,248,.5); }
.mdv-doc img{ max-width:100%; border-radius:8px; }
.mdv-doc del{ color:var(--text3); }

/* 문서 페이지(한글 등) — 실제 종이 문서 형태 */
.doc-page{
  background:#fff; border:1px solid var(--border); border-radius:4px;
  box-shadow:0 3px 18px rgba(26,29,46,.1);
  max-width:820px; margin:0 auto; padding:64px 72px; min-height:60vh;
}
.doc-page>*:first-child{ margin-top:0; }
.doc-page table{ font-size:.9em; }

/* PDF 페이지 */
.pdf-pages{ display:flex; flex-direction:column; align-items:center; gap:22px; }
.pdf-pages canvas{
  max-width:100%; background:#fff; border:1px solid var(--border);
  border-radius:6px; box-shadow:0 3px 14px rgba(26,29,46,.1);
}
/* 로딩 상태 */
.mdv-loading{
  display:flex; flex-direction:column; align-items:center; gap:14px;
  padding:80px 0; color:var(--text3); font-size:13px;
}
.mdv-spin{
  width:30px; height:30px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:mdv-rot .8s linear infinite;
}
@keyframes mdv-rot{ to{ transform:rotate(360deg); } }
.mdv-err{
  margin:40px auto; max-width:520px; padding:18px 20px; border-radius:12px;
  background:#fff0f0; border:1px solid #f0c0c0; color:#b03030;
  font-size:13px; line-height:1.6;
}

.mdv-note{
  margin:14px 18px; padding:10px 12px; border-radius:8px; font-size:11px;
  line-height:1.5; background:#fff8e6; border:1px solid #f0e0b0; color:#8a6d1a;
  display:none;
}
</style>
</head>
<body>
  <aside class="mdv-side">
    <div class="mdv-side-head">
      <div class="mdv-side-title">📖 문서 뷰어</div>
      <div class="mdv-side-sub">Markdown Viewer</div>
    </div>
    <div class="mdv-open">
      <button class="mdv-btn" id="btnOpen">📂 파일 열기</button>
    </div>
    <input type="file" id="fileInput" accept=".md,.markdown,.txt,.pdf,.docx,.hwp,.hwpx" hidden />
    <div class="mdv-note" id="fetchNote">
      프로젝트 문서를 목록에서 바로 못 여는 경우, 위 “파일 열기”로 파일을 직접 선택하거나 화면에 끌어다 놓으세요.
    </div>
    <div class="mdv-recent-wrap" id="recentWrap" style="display:none">
      <div class="mdv-list-label">최근 연 파일</div>
      <div class="mdv-recent" id="recentList"></div>
    </div>
    <div class="mdv-list-label">프로젝트 문서</div>
    <div class="mdv-list" id="docList"></div>
  </aside>

  <main class="mdv-main" id="main">
    <div class="mdv-topbar">
      <div class="mdv-cur" id="curTitle"><span class="badge">MD</span>문서를 선택하세요</div>
      <div class="mdv-tools">
        <button class="tbtn" id="btnEdit" disabled title="문서 내용을 화면에서 직접 수정">✏️ 편집</button>
        <button class="tbtn" id="btnDlHwp" disabled title="한글(.hml) 파일로 저장 — 한글에서 열어 .hwp로 저장 가능">⬇ 한글</button>
        <button class="tbtn" id="btnDlWord" disabled title="Word(.doc) 파일로 저장">⬇ Word</button>
        <button class="tbtn" id="btnDlPdf" disabled title="인쇄 창에서 ‘PDF로 저장’ 선택">⬇ PDF</button>
      </div>
      <div class="mdv-zoom" id="zoomBar">
        <button class="zbtn" id="zoomOut" title="축소 (Ctrl -)">−</button>
        <span class="zlabel" id="zoomLabel">100%</span>
        <button class="zbtn" id="zoomIn" title="확대 (Ctrl +)">+</button>
        <button class="zbtn zreset" id="zoomReset" title="원래 크기 (Ctrl 0)">↺</button>
      </div>
    </div>
    <div class="mdv-scroll">
      <div class="mdv-doc" id="doc"></div>
    </div>
    <div class="mdv-empty" id="empty">
      <div class="big">📖</div>
      <div class="t1">문서를 열어보세요</div>
      <div class="t2">왼쪽 목록에서 선택하거나 · 파일을 열거나 · 여기로 파일을 끌어다 놓으세요<br>지원 형식 · <b>.md</b> · <b>.pdf</b> · <b>.docx</b> · <b>.hwp</b> · <b>.hwpx</b></div>
    </div>
  </main>

  <div class="mdv-toast" id="toast"></div>

<script src="viewer.js"></script>
</body>
</html>
