<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>신구대조표</title>
<!-- 오프라인 동작: 모든 라이브러리를 같은 폴더의 lib/ 에서 로드 (인터넷 불필요) -->
<script src="lib/mammoth.browser.min.js"></script>
<script src="lib/exceljs.min.js"></script>
<script src="lib/fflate.min.js"></script>
<!-- 처리방침 빌더와 동일한 서체. 오프라인일 땐 시스템 폰트로 자연스럽게 대체됨 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
.sgd-root{
  --bg:#f6f7fb; --surface:#ffffff; --surface2:#f1f3f8; --surface3:#e8ebf2;
  --ink:#1a1d2e; --ink-2:#4a5068; --muted:#9298b0;
  --line:#e0e4ef; --line-strong:#d5d9e8;
  --accent:#3d5af1; --accent-2:#6c47e8; --accent-700:#2f49d6; --accent-50:#eef1fe;
  --success:#00b896;
  --del:#d94040; --del-bg:#fff0f0; --add:#3d5af1; --add-bg:#eef1fe;
  --mod:#00b896; --mod-bg:#e6faf6;
  --shadow:0 1px 3px rgba(26,29,46,.05), 0 8px 24px rgba(26,29,46,.06);
  --sans:'Noto Sans KR',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
  font-family:var(--sans); color:var(--ink); background:var(--bg); min-height:100vh;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
*{box-sizing:border-box}
html,body{margin:0; background:#f6f7fb}
.sgd-wrap{max-width:1080px; margin:0 auto; padding:48px 22px 72px}

.sgd-masthead{padding-top:8px}
.sgd-brand{display:flex; align-items:center; gap:16px}
.sgd-seal-brand{
  flex:none; width:46px; height:46px; color:#fff;
  font-size:22px; font-weight:600; display:flex; align-items:center; justify-content:center;
  border-radius:11px; background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 4px 14px rgba(61,90,241,.30);
}
.sgd-title{margin:0; font-size:30px; font-weight:800; letter-spacing:-.4px; line-height:1.12; color:var(--ink)}
.sgd-sub{margin:7px 0 0; color:var(--muted); font-size:14px; letter-spacing:0; line-height:1.5}
.sgd-rule{border-top:1px solid var(--line); margin-top:22px}
.sgd-rule-thin{display:none}

.sgd-error{margin:20px 0 0; padding:13px 18px; background:var(--del-bg); color:var(--del);
  border:1px solid #efc4c0; border-left-width:3px; border-radius:8px; font-size:14px}

.sgd-stage{display:grid; grid-template-columns:1fr 64px 1fr; margin-top:36px; align-items:stretch}
.sgd-panel{background:var(--surface); border:1px solid var(--line); border-radius:12px; box-shadow:var(--shadow); overflow:hidden}
.sgd-panel-left,.sgd-panel-right{border-radius:12px}
.sgd-panel-h{display:flex; justify-content:space-between; align-items:center; padding:13px 18px; background:var(--surface2); border-bottom:1px solid var(--line)}
.sgd-panel-label{font-size:14px; font-weight:700; letter-spacing:-.2px; color:var(--ink)}
.sgd-panel-cap{font-size:11px; color:var(--muted)}
.sgd-drop{min-height:188px; padding:26px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; outline:none; transition:background .18s ease}
.sgd-drop.over{background:var(--accent-50)}
.sgd-drop:focus-visible{box-shadow:inset 0 0 0 2px var(--accent)}
.sgd-drop-empty{display:flex; flex-direction:column; align-items:center; gap:11px; color:var(--muted); font-size:14px; text-align:center}
.sgd-drop-empty b{color:var(--ink); font-weight:600}
.sgd-fileinfo{display:flex; align-items:center; gap:14px; width:100%}
.sgd-fileicon{flex:none; width:44px; height:44px; border-radius:8px; background:var(--accent-50); color:var(--accent);
  display:flex; align-items:center; justify-content:center}
.sgd-filemeta{min-width:0; flex:1}
.sgd-filename{font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.sgd-filesub{font-size:12.5px; color:var(--muted); margin-top:3px}
.sgd-link{flex:none; background:none; border:none; color:var(--accent); font-size:13px; cursor:pointer; padding:4px 6px; font-family:var(--sans)}
.sgd-link:hover{text-decoration:underline}

.sgd-seam{display:flex; align-items:center; justify-content:center; position:relative; background:transparent}
.sgd-seam::before{content:""; position:absolute; left:8px; right:8px; height:1px; background:var(--line-strong)}
.sgd-seal-mark{position:relative; z-index:1; width:44px; height:44px; color:var(--accent);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:600; line-height:1.05; text-align:center; background:var(--surface);
  border:1px solid var(--line-strong); box-shadow:var(--shadow)}

.sgd-cta{margin-top:30px; display:flex; flex-direction:column; align-items:center; gap:13px}
.sgd-btn-primary{background:var(--accent); color:#fff; border:none; padding:12px 30px; border-radius:8px;
  font-family:var(--sans); font-size:15px; font-weight:700; letter-spacing:-.2px; cursor:pointer;
  box-shadow:0 2px 8px rgba(61,90,241,.25); transition:background .18s, transform .12s, box-shadow .18s}
.sgd-btn-primary:hover:not(:disabled){background:var(--accent-700); transform:translateY(-1px); box-shadow:0 4px 14px rgba(61,90,241,.34)}
.sgd-btn-primary:active:not(:disabled){transform:translateY(0)}
.sgd-btn-primary:disabled{opacity:.4; cursor:not-allowed}
.sgd-cta-hint{margin:0; color:var(--muted); font-size:12.5px; text-align:center; line-height:1.5}

.sgd-result{animation:fadeUp .4s cubic-bezier(.22,.61,.36,1) both}
.sgd-rhead{margin:0 0 20px}
.sgd-rhead-top{display:flex; align-items:center; gap:18px}
.sgd-toolbar{display:flex; justify-content:space-between; align-items:center; gap:14px 22px; flex-wrap:wrap;
  margin:0 0 20px; padding-bottom:20px; border-bottom:1px solid var(--line)}
.sgd-controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.sgd-seg{display:inline-flex; border-radius:9px; padding:3px; background:var(--surface2); border:1px solid var(--line); gap:3px}
.sgd-seg button{padding:6px 14px; font-size:12px; font-weight:600; border:none; background:transparent; color:var(--ink-2); cursor:pointer;
  font-family:var(--sans); border-radius:6px; transition:background .18s, color .18s, box-shadow .18s}
.sgd-seg button:hover:not(.active){color:var(--accent)}
.sgd-seg button.active{background:var(--accent); color:#fff; box-shadow:0 2px 6px rgba(61,90,241,.28)}
.sgd-chips{display:flex; gap:6px; flex:none}
.sgd-chip{font-size:11.5px; padding:3px 10px; border-radius:980px; font-weight:700; white-space:nowrap; border:1px solid transparent}
.sgd-chip.add{color:var(--add); background:var(--add-bg); border-color:#c5cffb}
.sgd-chip.del{color:var(--del); background:var(--del-bg); border-color:#f0c0c0}
.sgd-chip.mod{color:var(--mod); background:var(--mod-bg); border-color:#a0ddd0}
.sgd-tools{display:flex; align-items:center; gap:7px; flex-wrap:wrap}
.sgd-tool-sep{width:1px; align-self:stretch; min-height:20px; background:var(--line-strong); margin:0 3px}
.sgd-btn-ghost{display:inline-flex; align-items:center; gap:6px; padding:8px 14px; font-size:12px; font-weight:600; cursor:pointer;
  background:var(--surface); border:1px solid var(--line-strong); border-radius:8px; color:var(--ink-2); font-family:var(--sans); transition:background .2s, color .2s, border-color .2s}
.sgd-btn-ghost:hover{background:var(--surface2); border-color:var(--accent); color:var(--accent)}
.sgd-btn-ghost.is-reset:hover{background:var(--del-bg); border-color:#f0c0c0; color:var(--del)}

.sgd-srcbar{display:flex; align-items:center; gap:12px; color:var(--muted); font-size:13px; margin:12px 0 0; flex-wrap:wrap}
.sgd-src i{font-style:normal; font-size:10px; color:var(--accent); background:var(--accent-50); border:1px solid #c5cffb;
  padding:2px 8px; border-radius:5px; margin-right:8px; font-weight:700}

.sgd-doctitle{flex:1 1 auto; min-width:0; border:none; border-bottom:1.5px solid transparent; background:transparent;
  font-family:var(--sans); font-size:24px; font-weight:800; letter-spacing:-.4px; color:var(--ink);
  padding:2px 0 9px; outline:none}
.sgd-doctitle:hover{border-bottom-color:var(--line-strong)}
.sgd-doctitle:focus{border-bottom-color:var(--accent)}
.sgd-printmeta{display:none}

.sgd-noted{margin:6px 0 16px; padding:12px 16px; background:var(--accent-50); color:var(--accent);
  border-left:3px solid var(--accent); border-radius:8px; font-size:14px}

.sgd-table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px; background:var(--surface); box-shadow:var(--shadow)}
.sgd-table{width:100%; min-width:820px; border-collapse:collapse; font-size:14px; line-height:1.7}
.sgd-table thead th{position:sticky; top:0; background:var(--surface2); color:var(--ink-2);
  font-weight:700; font-size:12px; letter-spacing:-.1px; padding:12px 16px; border-bottom:1px solid var(--line-strong); border-right:1px solid var(--line); text-align:left; z-index:1}
.sgd-table thead th:last-child{border-right:none}
.sgd-table th.c-gut, .sgd-table td.c-gut{width:74px; text-align:center}
.sgd-table th.c-remark, .sgd-table td.c-remark{width:160px}
.sgd-table td.c-remark{background:#f8f9fc; cursor:text; color:var(--ink-2); font-size:13.5px; outline:none}
.sgd-table td.c-remark:focus{background:#fff; box-shadow:inset 0 0 0 2px var(--accent)}
.sgd-table td.c-remark:empty::before{content:"입력"; color:#c7c7cc}
.sgd-table td{padding:13px 16px; vertical-align:top; border-bottom:1px solid var(--line); border-right:1px solid var(--line); word-break:break-word}
.sgd-table td:last-child{border-right:none}
.sgd-table tbody tr:last-child td{border-bottom:none}
.sgd-table tbody tr:hover td{background:#f8f9fc}
.sgd-table td.cell-old-changed{background:#fff5f5} .sgd-table td.cell-new-changed{background:#f3f5ff}
.sgd-table td.cell-old-changed:hover, .sgd-table td.cell-new-changed:hover{background:inherit}
.row-equal td{color:var(--ink)}
.sgd-rownum{display:block; font-family:var(--mono); font-size:11px; color:var(--muted); margin-bottom:6px}
.sgd-tag{display:inline-block; font-size:10px; padding:2px 8px; border-radius:5px; font-weight:700; letter-spacing:-.01em; border:1px solid transparent}
.t-sin{color:var(--add); background:var(--add-bg); border-color:#c5cffb}
.t-del{color:var(--del); background:var(--del-bg); border-color:#f0c0c0}
.t-mod{color:var(--mod); background:var(--mod-bg); border-color:#a0ddd0}
.t-keep{color:var(--muted); background:var(--surface2); border-color:var(--line)}
.sgd-del{color:var(--del); background:var(--del-bg); text-decoration:line-through; text-decoration-thickness:1px; border-radius:4px; padding:0 2px}
.sgd-ins{color:var(--add); background:var(--add-bg); text-decoration:underline; text-underline-offset:2px; border-radius:4px; padding:0 2px}
.sgd-empty{color:var(--muted); font-style:italic}
.sgd-subtable{width:100%; border-collapse:collapse; font-size:13.5px; line-height:1.6}
.sgd-subtable td{border:1px solid var(--line-strong); padding:6px 9px; vertical-align:top; word-break:break-word}
.sgd-subtable tr.trow-ins td{background:var(--add-bg)}
.sgd-subtable tr.trow-del td{background:var(--del-bg)}
.sgd-subtable tr.trow-mod td{background:var(--mod-bg)}

.sgd-foot{margin-top:44px; text-align:center; color:var(--muted); font-size:12px; letter-spacing:-.01em}

.sgd-spinner{width:20px; height:20px; border:2px solid var(--line-strong); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){.sgd-result{animation:none} .sgd-spinner{animation-duration:1.4s}}

@media (max-width:720px){
  .sgd-wrap{padding:32px 18px 56px}
  .sgd-stage{grid-template-columns:1fr; gap:14px}
  .sgd-seam{padding:2px 0}
  .sgd-seam::before{left:auto; right:auto; top:auto; bottom:auto; width:1px; height:auto; background:transparent}
  .sgd-title{font-size:28px}
  .sgd-toolbar{align-items:flex-start}
}
@media print{
  .sgd-noprint{display:none !important}
  .sgd-root{background:#fff}
  .sgd-wrap{max-width:none; padding:0}
  .sgd-result{animation:none}
  .sgd-printmeta{display:block; color:#9298b0; font-size:11px; margin:0 0 12px; font-family:var(--sans)}
  .sgd-doctitle{font-size:20px; padding:0 0 6px}
  .sgd-table-wrap{overflow:visible; border:none; border-radius:0}
  .sgd-table{min-width:0; font-size:11.5px}
  .sgd-table thead th{position:static; background:#f1f3f8 !important; color:#1a1d2e !important; border-right-color:#e0e4ef; -webkit-print-color-adjust:exact; print-color-adjust:exact}
  .sgd-table tr{page-break-inside:avoid}
  .sgd-del,.sgd-ins,.sgd-tag,.cell-old-changed,.cell-new-changed,.sgd-subtable tr td{-webkit-print-color-adjust:exact; print-color-adjust:exact}
  .sgd-subtable{font-size:10.5px}
  .sgd-table td.c-remark:empty::before{content:""}
  @page{size:A4 portrait; margin:14mm}
}
</style>
</head>
<body>
<div class="sgd-root"><div class="sgd-wrap">

  <header class="sgd-masthead sgd-noprint">
    <div class="sgd-brand">
      <div class="sgd-seal-brand"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="11" height="14" rx="2"/><path d="M17 7h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2"/></svg></div>
      <div>
        <h1 class="sgd-title">신구대조표</h1>
        <p class="sgd-sub">이전 문서와 수정 문서를 올리면 현행–개정안 대조표를 만들어 줍니다.</p>
      </div>
    </div>
    <div class="sgd-rule"></div><div class="sgd-rule-thin"></div>
  </header>

  <div id="error" class="sgd-error sgd-noprint" role="alert" hidden></div>

  <section id="stage" class="sgd-stage sgd-noprint">
    <div class="sgd-panel sgd-panel-left">
      <div class="sgd-panel-h"><span class="sgd-panel-label">현행</span><span class="sgd-panel-cap">이전 문서</span></div>
      <input id="file-old" type="file" accept=".docx,.hwp,.hwpx" hidden />
      <div id="drop-old" class="sgd-drop" role="button" tabindex="0" aria-label="현행 문서 파일 선택"></div>
    </div>
    <div class="sgd-seam" aria-hidden="true"><div class="sgd-seal-mark"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h13l-3-3"/><path d="M20 15H7l3 3"/></svg></div></div>
    <div class="sgd-panel sgd-panel-right">
      <div class="sgd-panel-h"><span class="sgd-panel-label">개정</span><span class="sgd-panel-cap">수정 문서</span></div>
      <input id="file-new" type="file" accept=".docx,.hwp,.hwpx" hidden />
      <div id="drop-new" class="sgd-drop" role="button" tabindex="0" aria-label="개정 문서 파일 선택"></div>
    </div>
  </section>

  <div id="cta" class="sgd-cta sgd-noprint">
    <button id="genBtn" class="sgd-btn-primary" disabled>대조표 만들기</button>
    <p class="sgd-cta-hint">지원 형식 .docx · .hwp · .hwpx — 모든 처리는 브라우저 안에서만 이루어지며 서버로 전송되지 않습니다.</p>
  </div>

  <section id="result" class="sgd-result" hidden></section>

  <footer class="sgd-foot sgd-noprint">신구대조표 생성기 · 모든 처리는 사용자 브라우저에서 이루어집니다</footer>

</div></div>

<script>
"use strict";

/* ───────── 아이콘 ───────── */
function icon(name, size){
  size = size || 18;
  const p = {
    upload:'<path d="M12 16V4"/><path d="m7 9 5-5 5 5"/><path d="M4 20h16"/>',
    doc:'<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>',
    check:'<path d="m5 12 5 5 9-11"/>',
    print:'<path d="M6 9V3h12v6"/><path d="M6 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="7" rx="1"/>',
    copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>',
    download:'<path d="M12 3v12"/><path d="m7 11 5 4 5-4"/><path d="M5 21h14"/>',
    sheet:'<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M4 9h16"/><path d="M4 15h16"/><path d="M10 3v18"/>',
    refresh:'<path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>',
    swap:'<path d="M4 9h12l-3-3"/><path d="M20 15H8l3 3"/>'
  };
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+p[name]+'</svg>';
}
const esc = (s)=> String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const escBr = (s)=> esc(s).replace(/\n/g,"<br>"); // 조 단위 묶음에서 문단 사이 줄바꿈 유지

/* ───────── 비교 로직 ───────── */
function bigrams(s){
  const t=s.replace(/\s+/g,"");
  if(t.length===0) return [];
  if(t.length===1) return [t];
  const out=[]; for(let i=0;i<t.length-1;i++) out.push(t.slice(i,i+2)); return out;
}
function diceSim(a,b){
  if(a===b) return 1;
  if(!a.length||!b.length) return 0;
  const A=bigrams(a),B=bigrams(b);
  if(!A.length||!B.length) return a===b?1:0;
  const m=new Map();
  for(const g of A) m.set(g,(m.get(g)||0)+1);
  let inter=0;
  for(const g of B){ const c=m.get(g)||0; if(c>0){ inter++; m.set(g,c-1);} }
  return (2*inter)/(A.length+B.length);
}
/* 키 문자열 배열 a,b 를 정렬해 인덱스 기반 연산 목록을 돌려준다.
   반환: [{type:'equal'|'modify'|'delete'|'insert', ai:<a 인덱스|null>, bi:<b 인덱스|null>}] */
function alignIndices(a,b){
  const ops=[]; let p=0;
  const n0=a.length,m0=b.length;
  while(p<n0&&p<m0&&a[p]===b[p]) p++;
  let sA=n0,sB=m0;
  while(sA>p&&sB>p&&a[sA-1]===b[sB-1]){ sA--; sB--; }
  for(let i=0;i<p;i++) ops.push({type:"equal",ai:i,bi:i});
  const aS=a.slice(p,sA), bS=b.slice(p,sB);
  const n=aS.length,m=bS.length,T=0.34;
  if(n&&m){
    const score=Array.from({length:n+1},()=>new Float64Array(m+1));
    const dir=Array.from({length:n+1},()=>new Int8Array(m+1));
    for(let i=1;i<=n;i++) dir[i][0]=2;
    for(let j=1;j<=m;j++) dir[0][j]=3;
    for(let i=1;i<=n;i++){
      for(let j=1;j<=m;j++){
        const diag=score[i-1][j-1]+(diceSim(aS[i-1],bS[j-1])-T);
        const up=score[i-1][j], left=score[i][j-1];
        let best=diag,d=1;
        if(up>best){best=up;d=2;}
        if(left>best){best=left;d=3;}
        score[i][j]=best; dir[i][j]=d;
      }
    }
    const mid=[]; let i=n,j=m;
    while(i>0||j>0){
      const d=i===0?3:j===0?2:dir[i][j];
      if(d===1){ const s=diceSim(aS[i-1],bS[j-1]); mid.push({type:s>=0.999?"equal":"modify",ai:p+i-1,bi:p+j-1}); i--; j--; }
      else if(d===2){ mid.push({type:"delete",ai:p+i-1,bi:null}); i--; }
      else { mid.push({type:"insert",ai:null,bi:p+j-1}); j--; }
    }
    mid.reverse(); for(const o of mid) ops.push(o);
  } else if(n){ for(let i=0;i<n;i++) ops.push({type:"delete",ai:p+i,bi:null}); }
  else if(m){ for(let j=0;j<m;j++) ops.push({type:"insert",ai:null,bi:p+j}); }
  for(let i=sA;i<n0;i++) ops.push({type:"equal",ai:i,bi:i-sA+sB});
  return ops;
}
function lcsTokens(a,b){
  const n=a.length,m=b.length;
  const dp=Array.from({length:n+1},()=>new Int32Array(m+1));
  for(let i=n-1;i>=0;i--) for(let j=m-1;j>=0;j--)
    dp[i][j]= a[i]===b[j]? dp[i+1][j+1]+1 : Math.max(dp[i+1][j],dp[i][j+1]);
  const res=[]; let i=0,j=0;
  while(i<n&&j<m){
    if(a[i]===b[j]){ res.push(["=",a[i]]); i++; j++; }
    else if(dp[i+1][j]>=dp[i][j+1]){ res.push(["-",a[i]]); i++; }
    else { res.push(["+",b[j]]); j++; }
  }
  while(i<n) res.push(["-",a[i++]]);
  while(j<m) res.push(["+",b[j++]]);
  return res;
}
const wordTok = (s)=> s.split(/(\s+)/).filter(t=>t!=="");
function buildParts(oldText,newText,unit){
  let a,b;
  if(unit==="char"){ a=Array.from(oldText); b=Array.from(newText); if(a.length*b.length>1200000){ a=wordTok(oldText); b=wordTok(newText); } }
  else { a=wordTok(oldText); b=wordTok(newText); }
  const ops=lcsTokens(a,b); const oldParts=[],newParts=[];
  const push=(arr,type,v)=>{ const last=arr[arr.length-1]; if(last&&last.type===type) last.text+=v; else arr.push({type,text:v}); };
  for(const o of ops){
    if(o[0]==="="){ push(oldParts,"eq",o[1]); push(newParts,"eq",o[1]); }
    else if(o[0]==="-") push(oldParts,"del",o[1]);
    else push(newParts,"ins",o[1]);
  }
  return {oldParts,newParts};
}
/* ───────── 조 단위 묶음 ─────────
   법령 구조는 보통  편 > 장 > 절 > 관 > 조  순이고, 조 아래에 항·호·목이 온다.
   - "제N조"(제1조, 제2조의2 …) 머리에 뒤따르는 항·호·목을 합쳐 한 행(=한 표 칸)으로 묶는다.
   - 편/장/절/관 제목은 그 자체로 경계이자 독립 행이 된다(직전 조에 흡수되지 않음).
   - 이런 머리표지가 전혀 없는 문서는 문단별과 동일하게 동작. */
const HEAD_RE=/^\s*제\s*\d+\s*(편|장|절|관)/;          // 편·장·절·관: 경계 + 독립 행
const ARTICLE_RE=/^\s*제\s*\d+\s*조(\s*의\s*\d+)?/;     // 조: 새 묶음 시작
function groupByArticle(items){
  const groups=[]; let cur=null;
  for(const it of items){
    if(it.type==="table"){ groups.push(it); cur=null; }    // 표는 묶지 않고 독립 행 + 경계
    else if(HEAD_RE.test(it.text)){ groups.push({type:"para",text:it.text}); cur=null; }  // 장/절 등은 경계
    else if(ARTICLE_RE.test(it.text)){ cur={type:"para",text:it.text}; groups.push(cur); }
    else if(cur){ cur.text+="\n"+it.text; }                // 항·호·목 → 현재 조에 합침
    else groups.push({type:"para",text:it.text});          // 그 외(제목 등)는 각자 한 묶음
  }
  return groups;
}
/* 정렬용 키: 표는 모든 셀을 이어붙이되 머리표지를 붙여 '표끼리만' 매칭되도록 한다. */
function itemKey(it){ return it.type==="table" ? "\x02TBL\x02"+it.rows.map(r=>r.join("\x01")).join("\x01") : it.text; }
function buildOps(){
  let O=state.old.items, N=state.new.items;
  if(state.group==="article"){ O=groupByArticle(O); N=groupByArticle(N); }
  const idxOps=alignIndices(O.map(itemKey), N.map(itemKey));
  state.ops=idxOps.map(o=>({ type:o.type, old:o.ai==null?null:O[o.ai], neu:o.bi==null?null:N[o.bi] }));
}
const TAGKEY={신설:"sin",삭제:"del",개정:"mod",유지:"keep"};
function computeRows(ops,unit){
  return ops.map((o,idx)=>{
    const base={idx:idx+1};
    if((o.old&&o.old.type==="table")||(o.neu&&o.neu.type==="table"))
      return Object.assign(base, computeTableRow(o,unit));
    const oldT=o.old?o.old.text:null, newT=o.neu?o.neu.text:null;
    if(o.type==="equal") return Object.assign(base,{tag:"유지",type:"equal",kind:"para",oldParts:[{type:"eq",text:oldT}],newParts:[{type:"eq",text:newT}]});
    if(o.type==="delete") return Object.assign(base,{tag:"삭제",type:"delete",kind:"para",oldParts:[{type:"del",text:oldT}],newParts:null});
    if(o.type==="insert") return Object.assign(base,{tag:"신설",type:"insert",kind:"para",oldParts:null,newParts:[{type:"ins",text:newT}]});
    if(unit==="para") return Object.assign(base,{tag:"개정",type:"modify",kind:"para",oldParts:[{type:"del",text:oldT}],newParts:[{type:"ins",text:newT}]});
    const r=buildParts(oldT,newT,unit);
    return Object.assign(base,{tag:"개정",type:"modify",kind:"para",oldParts:r.oldParts,newParts:r.newParts});
  });
}
/* ───────── 표 비교 ─────────
   표는 행을 정렬(LCS+유사도)해 행 단위로 신설/삭제/개정/유지를 정하고,
   개정 행은 같은 열끼리 셀 내용을 어절/글자 단위로 강조한다.
   결과 grid: [{rowType, cells:[parts,…]}]  — 현행(oldGrid)·개정안(newGrid) 두 격자로 나눠 둔다. */
function gridPlain(tab,partType){
  const rt = partType==="ins"?"insert": partType==="del"?"delete":"equal";
  return tab.rows.map(r=>({ rowType:rt, cells:r.map(c=>[{type:partType,text:c}]) }));
}
function gridFromText(text,partType){
  const rt = partType==="ins"?"insert":"delete";
  return [{ rowType:rt, cells:[[{type:partType,text:text}]] }];
}
function diffTable(oldT,newT,unit){
  const rowOps=alignIndices(oldT.rows.map(r=>r.join("\x01")), newT.rows.map(r=>r.join("\x01")));
  const oldGrid=[], newGrid=[];
  for(const op of rowOps){
    if(op.type==="equal"){
      oldGrid.push({rowType:"equal", cells:oldT.rows[op.ai].map(c=>[{type:"eq",text:c}])});
      newGrid.push({rowType:"equal", cells:newT.rows[op.bi].map(c=>[{type:"eq",text:c}])});
    } else if(op.type==="delete"){
      oldGrid.push({rowType:"delete", cells:oldT.rows[op.ai].map(c=>[{type:"del",text:c}])});
    } else if(op.type==="insert"){
      newGrid.push({rowType:"insert", cells:newT.rows[op.bi].map(c=>[{type:"ins",text:c}])});
    } else {
      const orow=oldT.rows[op.ai], nrow=newT.rows[op.bi];
      const cols=Math.max(orow.length,nrow.length), oCells=[], nCells=[];
      for(let c=0;c<cols;c++){
        const ot=orow[c]==null?"":orow[c], nt=nrow[c]==null?"":nrow[c];
        if(ot===nt){ oCells.push([{type:"eq",text:ot}]); nCells.push([{type:"eq",text:nt}]); }
        else if(unit==="para"){ oCells.push([{type:"del",text:ot}]); nCells.push([{type:"ins",text:nt}]); }
        else { const pr=buildParts(ot,nt,unit);
          oCells.push(pr.oldParts.length?pr.oldParts:[{type:"eq",text:""}]);
          nCells.push(pr.newParts.length?pr.newParts:[{type:"eq",text:""}]); }
      }
      oldGrid.push({rowType:"modify", cells:oCells});
      newGrid.push({rowType:"modify", cells:nCells});
    }
  }
  return {oldGrid,newGrid};
}
function computeTableRow(o,unit){
  const oTab=o.old&&o.old.type==="table"?o.old:null;
  const nTab=o.neu&&o.neu.type==="table"?o.neu:null;
  if(o.type==="equal") return {tag:"유지",type:"equal",kind:"table",oldGrid:gridPlain(oTab,"eq"),newGrid:gridPlain(nTab,"eq")};
  if(o.type==="insert") return {tag:"신설",type:"insert",kind:"table",oldGrid:null,newGrid:nTab?gridPlain(nTab,"ins"):gridFromText(o.neu.text,"ins")};
  if(o.type==="delete") return {tag:"삭제",type:"delete",kind:"table",oldGrid:oTab?gridPlain(oTab,"del"):gridFromText(o.old.text,"del"),newGrid:null};
  if(oTab&&nTab){ const d=diffTable(oTab,nTab,unit); return {tag:"개정",type:"modify",kind:"table",oldGrid:d.oldGrid,newGrid:d.newGrid}; }
  return {tag:"개정",type:"modify",kind:"table",                    // 표↔문단처럼 종류가 다른 개정
    oldGrid:oTab?gridPlain(oTab,"del"):gridFromText(o.old.text,"del"),
    newGrid:nTab?gridPlain(nTab,"ins"):gridFromText(o.neu.text,"ins")};
}

/* ───────── 파싱: DOCX ───────── */
const clean=(s)=> s.replace(/\s+/g," ").trim();
function docxTable(tableEl){
  const rows=[];
  for(const tr of tableEl.querySelectorAll(":scope > tbody > tr, :scope > tr")){
    const cells=[...tr.children].filter(c=>/^(td|th)$/i.test(c.tagName)).map(c=>clean(c.textContent));
    if(cells.length) rows.push(cells);
  }
  if(!rows.length) return null;
  return {type:"table", rows, cols:rows.reduce((m,r)=>Math.max(m,r.length),0)};
}
async function parseDocx(file){
  if(typeof mammoth==="undefined") throw new Error("docx 모듈 로딩 실패");
  const arrayBuffer=await file.arrayBuffer();
  const items=[];
  try{
    const r=await mammoth.convertToHtml({arrayBuffer},{convertImage:()=>({})});
    const doc=new DOMParser().parseFromString(r.value,"text/html");
    const walk=(node)=>{
      for(const el of node.children){
        const tag=el.tagName.toLowerCase();
        if(tag==="table"){ const t=docxTable(el); if(t) items.push(t); }
        else if(/^(ul|ol|div|section|article|header|footer|main)$/.test(tag)){ walk(el); }
        else { const t=clean(el.textContent); if(t) items.push({type:"para",text:t}); }
      }
    };
    walk(doc.body);
  }catch(e){ /* raw 폴백 */ }
  if(items.length===0){
    const r=await mammoth.extractRawText({arrayBuffer});
    for(const line of r.value.split(/\r?\n/)){ const t=clean(line); if(t) items.push({type:"para",text:t}); }
  }
  return items;
}

/* ───────── 파싱: HWPX (한글 2010~, ZIP+XML) ───────── */
function hwpxNearestTbl(el){ let p=el.parentNode; while(p){ if(p.localName==="tbl") return p; p=p.parentNode; } return null; }
function hwpxCellText(tc){ return clean([...tc.getElementsByTagNameNS("*","t")].map(t=>t.textContent).join("")); }
function hwpxTable(tbl){
  const rows=[];
  for(const tr of [...tbl.getElementsByTagNameNS("*","tr")]){
    if(hwpxNearestTbl(tr)!==tbl) continue;          // 중첩 표의 행은 제외
    const cells=[];
    for(const tc of [...tr.getElementsByTagNameNS("*","tc")]){
      if(hwpxNearestTbl(tc)!==tbl) continue;
      cells.push(hwpxCellText(tc));
    }
    if(cells.length) rows.push(cells);
  }
  if(!rows.length) return null;
  return {type:"table", rows, cols:rows.reduce((m,r)=>Math.max(m,r.length),0)};
}
function hwpxWalk(node, items){
  for(const child of node.childNodes){
    if(child.nodeType!==1) continue;
    const ln=child.localName;
    if(ln==="tbl"){ const t=hwpxTable(child); if(t) items.push(t); }       // 표는 단위로
    else if(ln==="p"){
      if(child.getElementsByTagNameNS("*","tbl").length){ hwpxWalk(child, items); }  // 표를 품은 단락은 내려가서 표만 수집
      else { const text=hwpxCellText(child); if(text) items.push({type:"para",text}); }
    } else { hwpxWalk(child, items); }
  }
}
async function parseHwpx(file){
  if(typeof fflate==="undefined") throw new Error("한글(.hwpx) 모듈 로딩 실패");
  const buf=new Uint8Array(await file.arrayBuffer());
  const files=fflate.unzipSync(buf);
  // Contents/section0.xml, section1.xml … 을 번호 순서대로
  const names=Object.keys(files)
    .filter(n=>/Contents\/section\d+\.xml$/i.test(n))
    .sort((a,b)=>(+a.match(/section(\d+)/i)[1])-(+b.match(/section(\d+)/i)[1]));
  const items=[];
  for(const name of names){
    const xml=fflate.strFromU8(files[name]);
    const doc=new DOMParser().parseFromString(xml,"application/xml");
    // 네임스페이스 접두사(hp:)에 의존하지 않도록 localName 기준으로 문서 순서대로 수집
    hwpxWalk(doc.documentElement, items);
  }
  return items;
}

/* ───────── 파싱: HWP (한글 5.0, 바이너리 CFB) ───────── */
let _hwpLib=null, _hwpLoading=null;
function loadHwpLib(){
  if(_hwpLib) return Promise.resolve(_hwpLib);
  if(window.__hwpjs){ _hwpLib=window.__hwpjs; return Promise.resolve(_hwpLib); }
  if(_hwpLoading) return _hwpLoading;
  // hwp.js 는 .hwp 를 올릴 때만 로컬 lib/ 에서 지연 로딩.
  // ES 모듈은 file:// 에서 CORS 로 막히므로, classic 스크립트(전역 window.__hwpjs)로 주입해 오프라인 동작 보장.
  _hwpLoading=new Promise((resolve,reject)=>{
    const s=document.createElement("script");
    s.src="lib/hwp.global.js"; s.async=true;
    s.onload=()=>{ if(window.__hwpjs){ _hwpLib=window.__hwpjs; resolve(_hwpLib); } else reject(new Error("한글(.hwp) 모듈 초기화 실패")); };
    s.onerror=()=>reject(new Error("한글(.hwp) 모듈 로딩 실패"));
    document.head.appendChild(s);
  });
  return _hwpLoading;
}
async function parseHwp(file){
  let mod;
  try{ mod=await loadHwpLib(); }
  catch(e){ throw new Error("한글(.hwp) 모듈 로딩 실패"); }
  const parse=mod.parse||(mod.default&&mod.default.parse)||mod.default;
  if(typeof parse!=="function") throw new Error("한글(.hwp) 파서를 찾지 못했어요");
  const bytes=new Uint8Array(await file.arrayBuffer());
  const docu=parse(bytes,{type:"array"});
  const blocks=[];
  for(const section of (docu.sections||[])){
    for(const para of (section.content||[])){
      let s="";
      for(const ch of (para.content||[])){
        // hwp.js: 실제 글자는 CharType.Char(0) 이면서 value 가 문자열.
        // value 가 숫자인 Char(0)은 null/개행 등 제어문자, Inline(1)·Extended(2)는 개체 → 모두 건너뜀
        if(ch&&ch.type===0&&typeof ch.value==="string"){
          s+=ch.value;
        }
      }
      s=s.replace(/\s+/g," ").trim();
      if(s) blocks.push(s);
    }
  }
  // .hwp(바이너리)는 표를 구조로 복원하기 어려워 문단으로만 처리
  return blocks.map(t=>({type:"para",text:t}));
}

/* ───────── 상태 & UI ───────── */
const state={ old:null, new:null, oldBusy:false, newBusy:false, ops:null, view:"changed", unit:"word", group:"article", title:"신구대조표", remarks:{} };
const $=(id)=>document.getElementById(id);
const fmtSize=(n)=> n<1024?n+" B": n<1048576?(n/1024).toFixed(0)+" KB":(n/1048576).toFixed(1)+" MB";

function setError(msg){ const e=$("error"); if(!msg){ e.hidden=true; e.textContent=""; } else { e.hidden=false; e.textContent=msg; } }

function renderPanel(which){
  const d=state[which], busy=state[which+"Busy"], el=$("drop-"+which);
  if(busy){ el.innerHTML='<div class="sgd-drop-empty"><div class="sgd-spinner"></div><span>읽는 중…</span></div>'; return; }
  if(d){
    el.innerHTML='<div class="sgd-fileinfo"><div class="sgd-fileicon">'+icon("doc",20)+'</div>'
      +'<div class="sgd-filemeta"><div class="sgd-filename" title="'+esc(d.name)+'">'+esc(d.name)+'</div>'
      +'<div class="sgd-filesub">'+d.kind.toUpperCase()+' · 문단 '+d.paraN.toLocaleString()+'개'+(d.tableN?' · 표 '+d.tableN+'개':'')+' · '+d.size+'</div></div>'
      +'<button class="sgd-link">바꾸기</button></div>';
    el.querySelector(".sgd-link").onclick=(e)=>{ e.stopPropagation(); state[which]=null; state.ops=null; hideResult(); renderPanel(which); updateGen(); setError(""); };
  } else {
    el.innerHTML='<div class="sgd-drop-empty">'+icon("upload",22)+'<span>여기로 <b>.docx · .hwp · .hwpx</b> 파일을 끌어다 놓거나 클릭</span></div>';
  }
}
function updateGen(){ $("genBtn").disabled = !(state.old&&state.new); }

async function handlePick(which,file){
  setError("");
  const ext=(file.name.toLowerCase().split(".").pop());
  const parsers={ docx:parseDocx, hwpx:parseHwpx, hwp:parseHwp };
  if(!parsers[ext]){ setError("지원하지 않는 형식이에요. .docx · .hwp · .hwpx 파일을 올려 주세요."); return; }
  state[which+"Busy"]=true; renderPanel(which);
  try{
    const items = await parsers[ext](file);
    if(items.length===0){ setError("문서에서 읽을 내용을 찾지 못했어요. 빈 문서인지 확인해 주세요."); }
    const paraN=items.filter(x=>x.type==="para").length, tableN=items.filter(x=>x.type==="table").length;
    state[which]={ name:file.name, size:fmtSize(file.size), items, paraN, tableN, kind:ext };
    state.ops=null; hideResult();
  }catch(err){
    console.error(err);
    if(ext==="hwp") setError("이 .hwp 파일을 읽지 못했어요. 한글에서 .hwpx 또는 Word(.docx)로 저장한 뒤 올려 주세요.");
    else setError("문서를 읽지 못했어요. 손상되지 않은 ."+ext+" 파일인지 확인해 주세요.");
  }finally{
    state[which+"Busy"]=false; renderPanel(which); updateGen();
  }
}

function hideResult(){ $("result").hidden=true; $("stage").hidden=false; $("cta").hidden=false; }
function showResult(){
  $("stage").hidden=true; $("cta").hidden=true;
  const r=$("result"); r.hidden=false;
  r.innerHTML=
    '<header class="sgd-rhead">'
    + '<div class="sgd-rhead-top">'
      + '<input class="sgd-doctitle" id="doctitle" value="'+esc(state.title)+'" aria-label="표 제목" />'
      + '<div class="sgd-chips sgd-noprint" id="chips"></div>'
    + '</div>'
    + '<div class="sgd-srcbar sgd-noprint"><span class="sgd-src"><i>현행</i> '+esc(state.old.name)+'</span>'+icon("swap",15)+'<span class="sgd-src"><i>개정</i> '+esc(state.new.name)+'</span></div>'
    + '</header>'
    + '<p class="sgd-printmeta">현행: '+esc(state.old.name)+' · 개정안: '+esc(state.new.name)+'</p>'
    + '<div class="sgd-toolbar sgd-noprint">'
    + '<div class="sgd-controls">'
      + '<div class="sgd-seg" id="seg-view"><button data-v="all">전체</button><button data-v="changed" class="active">변경만</button></div>'
      + '<div class="sgd-seg" id="seg-group"><button data-v="article"'+(state.group==="article"?' class="active"':'')+'>조 단위</button><button data-v="para"'+(state.group==="para"?' class="active"':'')+'>문단 단위</button></div>'
      + '<div class="sgd-seg" id="seg-unit"><button data-v="para">단락</button><button data-v="word" class="active">어절</button><button data-v="char">글자</button></div>'
    + '</div>'
    + '<div class="sgd-tools">'
      + '<button class="sgd-btn-ghost" id="btn-print">'+icon("print")+' 인쇄</button>'
      + '<button class="sgd-btn-ghost" id="btn-xlsx">'+icon("sheet")+' 엑셀 저장</button>'
      + '<button class="sgd-btn-ghost" id="btn-dl">'+icon("download")+' HTML 저장</button>'
      + '<button class="sgd-btn-ghost" id="btn-copy">'+icon("copy")+' 표 복사</button>'
      + '<span class="sgd-tool-sep" aria-hidden="true"></span>'
      + '<button class="sgd-btn-ghost is-reset" id="btn-reset">'+icon("refresh")+' 다시 시작</button>'
    + '</div>'
    + '</div>'
    + '<div class="sgd-noted sgd-noprint" id="noted" hidden></div>'
    + '<div class="sgd-table-wrap"><table class="sgd-table"><thead><tr><th class="c-gut">구분</th><th>현행</th><th>개정안</th><th class="c-remark">비고</th></tr></thead><tbody id="tbody"></tbody></table></div>';

  const setActive=(id,btn)=>document.querySelectorAll("#"+id+" button").forEach(x=>x.classList.toggle("active",x===btn));
  document.querySelectorAll("#seg-view button").forEach(b=>b.onclick=()=>{ state.view=b.dataset.v; setActive("seg-view",b); renderTable(); });
  document.querySelectorAll("#seg-group button").forEach(b=>b.onclick=()=>{ state.group=b.dataset.v; setActive("seg-group",b); buildOps(); renderTable(); });
  document.querySelectorAll("#seg-unit button").forEach(b=>b.onclick=()=>{ state.unit=b.dataset.v; setActive("seg-unit",b); renderTable(); });
  $("doctitle").oninput=(e)=>{ state.title=e.target.value; };
  $("btn-print").onclick=()=>window.print();
  $("btn-xlsx").onclick=doXlsx;
  $("btn-dl").onclick=doDownload;
  $("btn-copy").onclick=doCopy;
  $("btn-reset").onclick=reset;
  $("tbody").addEventListener("input",(e)=>{
    const cell=e.target.closest("[data-remark]");
    if(cell){ state.remarks[+cell.getAttribute("data-remark")]=cell.textContent; }
  });
  renderTable();
}

function renderTable(){
  const rows=computeRows(state.ops,state.unit);
  const stats={신설:0,삭제:0,개정:0};
  for(const o of state.ops){ if(o.type==="insert")stats.신설++; else if(o.type==="delete")stats.삭제++; else if(o.type==="modify")stats.개정++; }
  $("chips").innerHTML='<span class="sgd-chip add">신설 '+stats.신설+'</span><span class="sgd-chip del">삭제 '+stats.삭제+'</span><span class="sgd-chip mod">개정 '+stats.개정+'</span>';
  const changed=stats.신설+stats.삭제+stats.개정;
  const noted=$("noted");
  if(changed===0){ noted.hidden=false; noted.textContent="두 문서의 내용이 같습니다. 변경된 부분이 없습니다."; } else noted.hidden=true;
  const vis = state.view==="changed"? rows.filter(r=>r.tag!=="유지") : rows;
  const tb=$("tbody");
  if(!vis.length){ tb.innerHTML='<tr><td class="c-gut">–</td><td colspan="3" class="sgd-empty" style="text-align:center;padding:24px">표시할 행이 없습니다.</td></tr>'; return; }
  tb.innerHTML=vis.map((r,i)=>{
    const para = r.kind==="para" && r.type==="modify" && state.unit==="para";
    const oc=para?' class="cell-old-changed"':"";
    const nc=para?' class="cell-new-changed"':"";
    const remark=esc(state.remarks[r.idx]||"");
    const oldHtml = r.kind==="table" ? gridHtml(r.oldGrid,"old") : cellHtml(r.oldParts,"old");
    const newHtml = r.kind==="table" ? gridHtml(r.newGrid,"new") : cellHtml(r.newParts,"new");
    return '<tr class="row-'+r.type+'"><td class="c-gut"><span class="sgd-rownum">'+(i+1)+'</span><span class="sgd-tag t-'+TAGKEY[r.tag]+'">'+r.tag+'</span></td>'
      +'<td'+oc+'>'+oldHtml+'</td><td'+nc+'>'+newHtml+'</td>'
      +'<td class="c-remark" contenteditable="true" data-remark="'+r.idx+'">'+remark+'</td></tr>';
  }).join("");
}

function doDownload(){
  const rows=computeRows(state.ops,state.unit);
  const html=buildExportHtml(rows,state.title,state.old.name,state.new.name,true);
  const url=URL.createObjectURL(new Blob([html],{type:"text/html"}));
  const a=document.createElement("a"); a.href=url; a.download=(state.title||"신구대조표")+".html"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function doCopy(){
  const rows=computeRows(state.ops,state.unit);
  const html=buildExportHtml(rows,state.title,state.old.name,state.new.name,false);
  const sideText=(r,side)=>{
    if(r.kind==="table"){ const g=side==="old"?r.oldGrid:r.newGrid; return g?gridPlainText(g):(side==="old"?"(신설)":"(삭제)"); }
    const parts=side==="old"?r.oldParts:r.newParts; return parts?parts.map(p=>p.text).join(""):(side==="old"?"(신설)":"(삭제)");
  };
  const plain=rows.map(r=>{ const rm=state.remarks[r.idx]?(" | 비고: "+state.remarks[r.idx]):""; return "["+r.tag+"] "+sideText(r,"old")+"  ⇒  "+sideText(r,"new")+rm; }).join("\n");
  const btn=$("btn-copy"); const ok=()=>{ btn.innerHTML=icon("check")+" 복사됨"; setTimeout(()=>btn.innerHTML=icon("copy")+" 표 복사",1600); };
  try{
    await navigator.clipboard.write([new ClipboardItem({"text/html":new Blob([html],{type:"text/html"}),"text/plain":new Blob([plain],{type:"text/plain"})})]);
    ok();
  }catch(e){
    try{ await navigator.clipboard.writeText(plain); ok(); }catch(e2){ setError("복사가 차단됐어요. 'HTML 저장'을 이용해 주세요."); }
  }
}
/* 화면의 색/삭선/밑줄 강조를 엑셀 셀 안 리치텍스트(여러 글꼴 런)로 그대로 옮긴다.
   삭제=빨강+취소선, 추가=파랑+밑줄, 유지=기본. (조 단위 묶음의 줄바꿈도 보존) */
const XL_LINE={style:"thin",color:{argb:"FFE0E4EF"}};
const xlBorder=()=>({top:XL_LINE,left:XL_LINE,bottom:XL_LINE,right:XL_LINE});
function partsToRich(parts,side){
  if(!parts) return { richText:[{ text: side==="old"?"〈신설〉":"〈삭제〉", font:{ italic:true, color:{argb:"FF9298B0"} } }] };
  const runs=parts.filter(p=>p.text!=="").map(p=>{
    if(p.type==="del") return { text:p.text, font:{ color:{argb:"FFD94040"}, strike:true } };
    if(p.type==="ins") return { text:p.text, font:{ color:{argb:"FF3D5AF1"}, underline:true } };
    return { text:p.text, font:{ color:{argb:"FF1A1D2E"} } };
  });
  return runs.length? { richText:runs } : "";
}
function gridToRich(grid,side){
  if(!grid) return { richText:[{ text: side==="old"?"〈신설〉":"〈삭제〉", font:{ italic:true, color:{argb:"FF9298B0"} } }] };
  const runs=[];
  grid.forEach((row,ri)=>{
    if(ri) runs.push({ text:"\n" });
    row.cells.forEach((cell,ci)=>{
      if(ci) runs.push({ text:" | ", font:{ color:{argb:"FF9298B0"} } });
      for(const p of cell){
        if(p.text==="") continue;
        if(p.type==="del") runs.push({ text:p.text, font:{ color:{argb:"FFD94040"}, strike:true } });
        else if(p.type==="ins") runs.push({ text:p.text, font:{ color:{argb:"FF3D5AF1"}, underline:true } });
        else runs.push({ text:p.text, font:{ color:{argb:"FF1A1D2E"} } });
      }
    });
  });
  return runs.length? { richText:runs } : "";
}
async function doXlsx(){
  if(typeof ExcelJS==="undefined"){ setError("엑셀 모듈을 불러오지 못했어요. 잠시 후 다시 시도해 주세요."); return; }
  const rows=computeRows(state.ops,state.unit);
  const vis = state.view==="changed"? rows.filter(r=>r.tag!=="유지") : rows;
  const TAGCOLOR={신설:"FF3D5AF1",삭제:"FFD94040",개정:"FF00B896",유지:"FF9298B0"};
  try{
    const wb=new ExcelJS.Workbook();
    const ws=wb.addWorksheet("신구대조표",{views:[{state:"frozen",ySplit:1}]});
    ws.columns=[
      {header:"번호",key:"no",width:6},{header:"구분",key:"tag",width:9},
      {header:"현행",key:"old",width:52},{header:"개정안",key:"new",width:52},
      {header:"비고",key:"remark",width:24},
    ];
    ws.getRow(1).height=22;
    ws.getRow(1).eachCell(c=>{
      c.font={bold:true,color:{argb:"FF4A5068"}};
      c.fill={type:"pattern",pattern:"solid",fgColor:{argb:"FFF1F3F8"}};
      c.alignment={vertical:"middle",horizontal:"center"};
      c.border=xlBorder();
    });
    vis.forEach((r,i)=>{
      const oldVal = r.kind==="table"?gridToRich(r.oldGrid,"old"):partsToRich(r.oldParts,"old");
      const newVal = r.kind==="table"?gridToRich(r.newGrid,"new"):partsToRich(r.newParts,"new");
      const row=ws.addRow({ no:i+1, tag:r.tag, old:oldVal, new:newVal, remark:state.remarks[r.idx]||"" });
      row.getCell("no").alignment={vertical:"top",horizontal:"center"};
      const tc=row.getCell("tag"); tc.alignment={vertical:"top",horizontal:"center"}; tc.font={bold:true,color:{argb:TAGCOLOR[r.tag]}};
      row.getCell("old").alignment={vertical:"top",wrapText:true};
      row.getCell("new").alignment={vertical:"top",wrapText:true};
      row.getCell("remark").alignment={vertical:"top",wrapText:true};
      row.eachCell({includeEmpty:true},c=>{ c.border=xlBorder(); });
    });
    ws.autoFilter="A1:E1";
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=(state.title||"신구대조표")+".xlsx"; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  }catch(e){ console.error(e); setError("엑셀 저장에 실패했어요. 다시 시도해 주세요."); }
}
function reset(){ state.old=null; state.new=null; state.ops=null; state.remarks={}; setError(""); renderPanel("old"); renderPanel("new"); updateGen(); hideResult(); }

/* ───────── 초기화 ───────── */
function wireDrop(which){
  const drop=$("drop-"+which), input=$("file-"+which);
  input.addEventListener("change",(e)=>{ const f=e.target.files&&e.target.files[0]; if(f) handlePick(which,f); e.target.value=""; });
  drop.addEventListener("click",()=>{ if(!state[which+"Busy"]) input.click(); });
  drop.addEventListener("keydown",(e)=>{ if((e.key==="Enter"||e.key===" ")&&!state[which+"Busy"]){ e.preventDefault(); input.click(); } });
  drop.addEventListener("dragover",(e)=>{ e.preventDefault(); drop.classList.add("over"); });
  drop.addEventListener("dragleave",()=>drop.classList.remove("over"));
  drop.addEventListener("drop",(e)=>{ e.preventDefault(); drop.classList.remove("over"); const f=e.dataTransfer.files&&e.dataTransfer.files[0]; if(f) handlePick(which,f); });
}
$("genBtn").onclick=()=>{
  if(!state.old||!state.new) return;
  const btn=$("genBtn"); btn.disabled=true; btn.textContent="대조표 만드는 중…";
  setTimeout(()=>{
    buildOps();
    showResult(); btn.textContent="대조표 만들기"; btn.disabled=false;
  },30);
};
wireDrop("old"); wireDrop("new");
renderPanel("old"); renderPanel("new"); updateGen();
</script>
