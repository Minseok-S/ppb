<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>개인정보처리방침 빌더 — CELA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --accent: #3d5af1;
        --accent2: #6c47e8;
        --accent3: #00b896;
        --bg: #f4f6fb;
        --border: #e0e4ef;
        --text: #1a1d2e;
        --text2: #4a5068;
        --text3: #9298b0;
        --surface: #ffffff;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Noto Sans KR", sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── NAV ─── */
      nav {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 24px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        height: 54px;
        flex-shrink: 0;
        box-shadow:
          0 1px 0 var(--border),
          0 2px 8px rgba(0, 0, 0, 0.04);
        position: relative;
        z-index: 200;
      }

      /* Logo */
      .nav-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        user-select: none;
      }
      .logo-mark {
        width: 32px;
        height: 32px;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent2) 100%
        );
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        flex-shrink: 0;
        box-shadow: 0 2px 6px rgba(61, 90, 241, 0.3);
      }
      .logo-text {
        font-size: 15px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.4px;
        line-height: 1;
      }
      .logo-sub {
        font-size: 9.5px;
        color: var(--text3);
        font-family: "IBM Plex Mono", monospace;
        letter-spacing: 0.2px;
        margin-top: 2px;
      }

      /* Segmented control */
      .seg {
        display: flex;
        align-items: center;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 3px;
        gap: 2px;
      }
      .seg-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 15px;
        border: none;
        background: transparent;
        border-radius: 7px;
        cursor: pointer;
        font-family: "Noto Sans KR", sans-serif;
        font-size: 12.5px;
        font-weight: 600;
        color: var(--text3);
        transition:
          background 0.18s,
          color 0.18s,
          box-shadow 0.18s;
        white-space: nowrap;
        -webkit-user-select: none;
        user-select: none;
      }
      .seg-btn:hover:not(.active) {
        background: rgba(255, 255, 255, 0.7);
        color: var(--text2);
      }
      .seg-btn.active {
        background: var(--surface);
        color: var(--text);
        box-shadow:
          0 1px 4px rgba(0, 0, 0, 0.1),
          0 0 0 1px rgba(0, 0, 0, 0.04);
      }
      .seg-icon {
        font-size: 13px;
        line-height: 1;
      }
      .seg-tag {
        font-size: 8.5px;
        font-weight: 700;
        font-family: "IBM Plex Mono", monospace;
        letter-spacing: 0.5px;
        padding: 2px 5px;
        border-radius: 4px;
        background: rgba(61, 90, 241, 0.1);
        color: var(--accent);
        transition:
          background 0.18s,
          color 0.18s;
      }
      .seg-btn.active .seg-tag {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
      }
      .seg-tag.green {
        background: rgba(0, 184, 150, 0.1);
        color: var(--accent3);
      }
      .seg-btn.active .seg-tag.green {
        background: linear-gradient(135deg, var(--accent3), #00976e);
        color: #fff;
      }
      .seg-tag.orange {
        background: rgba(232, 126, 34, 0.12);
        color: #e07b1a;
      }
      .seg-btn.active .seg-tag.orange {
        background: linear-gradient(135deg, #f0932b, #e07b1a);
        color: #fff;
      }
      .seg-tag.purple {
        background: rgba(108, 71, 232, 0.12);
        color: var(--accent2);
      }
      .seg-btn.active .seg-tag.purple {
        background: linear-gradient(135deg, var(--accent2), #4f2fc7);
        color: #fff;
      }

      /* Nav right — version chip */
      .nav-right {
        display: flex;
        justify-content: flex-end;
        align-items: center;
      }
      .version-chip {
        font-size: 9.5px;
        font-family: "IBM Plex Mono", monospace;
        color: var(--text3);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 3px 9px;
        letter-spacing: 0.3px;
        user-select: none;
      }

      /* ─── FRAME AREA ─── */
      .frame-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
        min-height: 0;
      }
      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        transition: opacity 0.2s ease;
      }
      iframe.hidden {
        opacity: 0;
        pointer-events: none;
        z-index: 0;
      }
      iframe.visible {
        opacity: 1;
        pointer-events: auto;
        z-index: 1;
      }

      /* ─── LOADER ─── */
      .loader {
        position: absolute;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        z-index: 20;
        transition: opacity 0.25s ease;
      }
      .loader.done {
        opacity: 0;
        pointer-events: none;
      }
      .loader-icon {
        font-size: 36px;
        margin-bottom: 16px;
        animation: pulse-icon 1.8s ease-in-out infinite;
      }
      @keyframes pulse-icon {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.07);
          opacity: 0.8;
        }
      }
      .loader-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 4px;
      }
      .loader-desc {
        font-size: 11.5px;
        color: var(--text3);
        margin-bottom: 28px;
        font-family: "IBM Plex Mono", monospace;
      }
      .loader-track {
        width: 120px;
        height: 3px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
      }
      .loader-bar {
        height: 100%;
        border-radius: 99px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        animation: bar-slide 1.4s ease-in-out infinite;
        transform-origin: left;
      }
      @keyframes bar-slide {
        0% {
          transform: translateX(-100%) scaleX(0.4);
        }
        50% {
          transform: translateX(60%) scaleX(0.6);
        }
        100% {
          transform: translateX(200%) scaleX(0.4);
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <!-- Logo -->
      <div class="nav-logo">
        <div class="logo-mark">🛡️</div>
        <div>
          <div class="logo-text">CELA</div>
          <div class="logo-sub">Privacy Tools Suite</div>
        </div>
      </div>

      <!-- Segmented control (center) -->
      <div class="seg">
        <button class="seg-btn active" id="tab-ppb" onclick="switchTab('ppb')">
          <span class="seg-icon">📋</span>
          개인정보처리방침 빌더
          <span class="seg-tag">PPB</span>
        </button>
        <!-- <button class="seg-btn" id="tab-csb" onclick="switchTab('csb')">
          <span class="seg-icon">📝</span>
          동의서 빌더
          <span class="seg-tag purple">CSB</span>
        </button> -->
        <button class="seg-btn" id="tab-lse" onclick="switchTab('lse')">
          <span class="seg-icon">✏️</span>
          실시간 편집기
          <span class="seg-tag green">LSE</span>
        </button>
        <button class="seg-btn" id="tab-sgt" onclick="switchTab('sgt')">
          <span class="seg-icon">🔀</span>
          신구대조표
          <span class="seg-tag orange">DCT</span>
        </button>
        <button class="seg-btn" id="tab-mdv" onclick="switchTab('mdv')">
          <span class="seg-icon">📖</span>
          문서 뷰어
          <span class="seg-tag purple">MD</span>
        </button>
        <!-- <button class="seg-btn" id="tab-pdf" onclick="switchTab('pdf')">
          <span class="seg-icon">📄</span>
          PDF 편집기
          <span class="seg-tag orange">PDF</span>
        </button> -->
      </div>

      <!-- Right -->
      <div class="nav-right">
        <span class="version-chip">v2026</span>
      </div>
    </nav>

    <!-- iframes -->
    <div class="frame-wrap">
      <div class="loader" id="loader-ppb">
        <div class="loader-icon">📋</div>
        <div class="loader-name">개인정보처리방침 빌더</div>
        <div class="loader-desc">loading PPB...</div>
        <div class="loader-track"><div class="loader-bar"></div></div>
      </div>

      <div class="loader done" id="loader-lse">
        <div class="loader-icon">✏️</div>
        <div class="loader-name">실시간 편집기</div>
        <div class="loader-desc">loading LSE...</div>
        <div class="loader-track"><div class="loader-bar"></div></div>
      </div>

      <div class="loader done" id="loader-sgt">
        <div class="loader-icon">🔀</div>
        <div class="loader-name">신구대조표</div>
        <div class="loader-desc">loading SGT...</div>
        <div class="loader-track"><div class="loader-bar"></div></div>
      </div>

      <div class="loader done" id="loader-mdv">
        <div class="loader-icon">📖</div>
        <div class="loader-name">문서 뷰어</div>
        <div class="loader-desc">loading MD...</div>
        <div class="loader-track"><div class="loader-bar"></div></div>
      </div>

      <div class="loader done" id="loader-csb">
        <div class="loader-icon">📝</div>
        <div class="loader-name">동의서 빌더</div>
        <div class="loader-desc">loading CSB...</div>
        <div class="loader-track"><div class="loader-bar"></div></div>
      </div>

      <div class="loader done" id="loader-pdf">
        <div class="loader-icon">📄</div>
        <div class="loader-name">PDF 편집기</div>
        <div class="loader-desc">loading PDF...</div>
        <div class="loader-track"><div class="loader-bar"></div></div>
      </div>

      <iframe
        id="frame-ppb"
        class="visible"
        src="apps/ppb/builder.html"
        onload="typeof onFrameLoad === 'function' && onFrameLoad('ppb')"
      ></iframe>
      <iframe
        id="frame-lse"
        class="hidden"
        data-src="apps/lse/index.html"
        onload="typeof onFrameLoad === 'function' && onFrameLoad('lse')"
      ></iframe>
      <iframe
        id="frame-sgt"
        class="hidden"
        data-src="apps/dct/index.html"
        onload="typeof onFrameLoad === 'function' && onFrameLoad('sgt')"
      ></iframe>
      <iframe
        id="frame-mdv"
        class="hidden"
        data-src="apps/mdv/index.html"
        onload="typeof onFrameLoad === 'function' && onFrameLoad('mdv')"
      ></iframe>
      <iframe
        id="frame-csb"
        class="hidden"
        data-src="apps/consent/index.html"
        onload="typeof onFrameLoad === 'function' && onFrameLoad('csb')"
      ></iframe>
      <iframe
        id="frame-pdf"
        class="hidden"
        data-src="apps/pdf/index.html"
        onload="typeof onFrameLoad === 'function' && onFrameLoad('pdf')"
      ></iframe>
    </div>

    <script>
      let current = "ppb";
      const loaded = { ppb: false, lse: false, sgt: false, mdv: false, csb: false, pdf: false };

      const TITLES = {
        ppb: "개인정보처리방침 빌더 — CELA",
        csb: "동의서 빌더 — CELA",
        lse: "실시간 편집기 — CELA",
        sgt: "신구대조표 — CELA",
        mdv: "문서 뷰어 — CELA",
        pdf: "PDF 편집기 — CELA",
      };

      function switchTab(tab) {
        if (current === tab) return;
        current = tab;

        document.title = TITLES[tab];

        document
          .querySelectorAll(".seg-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("tab-" + tab).classList.add("active");

        document.querySelectorAll("iframe").forEach((f) => {
          f.classList.toggle("visible", f.id === "frame-" + tab);
          f.classList.toggle("hidden", f.id !== "frame-" + tab);
        });

        // lazy-load on first visit
        const frame = document.getElementById("frame-" + tab);
        const emptySrc = !frame.src || frame.src === window.location.href;
        if (emptySrc && frame.dataset.src) {
          document.getElementById("loader-" + tab).classList.remove("done");
          frame.src = frame.dataset.src;
        }
      }

      function onFrameLoad(tab) {
        loaded[tab] = true;
        document.getElementById("loader-" + tab).classList.add("done");
      }
    </script>
  </body>
</html>
